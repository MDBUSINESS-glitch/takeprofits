<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Picks Module - Manuel Danca v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CSS VARIABLES & RESET
================================================================ */
:root{
  --bg:#090d12;--bg-card:#0c1318;--bg-card2:#111a22;--bg-card3:#0f1820;
  --border:rgba(38,50,60,.95);--border2:rgba(255,255,255,.04);--border3:rgba(255,255,255,.07);
  --t1:#f1f3f4;--t2:#9aa5b1;--t3:#5d7282;--t4:#324050;
  --green:#7cc245;--green-dim:rgba(124,194,69,.12);--green-brd:rgba(124,194,69,.3);
  --blue:#00a8e8;--blue-dim:rgba(0,168,232,.1);--blue-brd:rgba(0,168,232,.28);
  --red:#e65e4c;--yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;--gold:#f59e0b;
  --lime:#b5ff3b;--lime-dim:rgba(181,255,59,.1);--lime-brd:rgba(181,255,59,.3);
  /* DraftEdge quality colors */
  --q-blue:#00a8e8;--q-green:#22c55e;--q-yellow:#fbbf24;--q-red:#e65e4c;
  /* Sport colors */
  --nba:#00a8e8;--nfl:#fb923c;--nhl:#a78bfa;--mlb:#f59e0b;--soccer:#7cc245;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;-webkit-font-smoothing:antialiased}
*{scrollbar-width:thin;scrollbar-color:#1a2836 transparent}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#1a2836;border-radius:4px}

/* ================================================================
   LAYOUT
================================================================ */
.module-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ================================================================
   ROW 1 — SPORT NAV (top row, always visible)
   Style: smartbet.gg inspired dark pill aesthetic
================================================================ */
.sport-row{
  display:flex;gap:6px;padding:9px 14px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;align-items:center;
  background:#0c1015;
}
.sport-row::-webkit-scrollbar{height:0}

/* Sport pill buttons */
.sp-btn{
  padding:5px 14px;border-radius:50px;font-size:.72rem;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .15s ease;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  color:#6b7a8a;
  user-select:none;font-family:'Inter',sans-serif;
  letter-spacing:.01em;
}
.sp-btn:hover{color:#c8d4dd;background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15)}
.sp-btn.active{
  background:var(--lime);color:#060d08;
  border-color:var(--lime);font-weight:800;
  box-shadow:0 0 12px rgba(181,255,59,.25);
}
.sp-btn.sp-fire{color:#f97316;border-color:rgba(249,115,22,.25);background:rgba(249,115,22,.07)}
.sp-btn.sp-fire.active{background:#f97316;color:#fff;border-color:#f97316;box-shadow:0 0 12px rgba(249,115,22,.3)}
/* Sport-colored active states */
.sp-btn.sp-soccer.active{background:#7cc245;border-color:#7cc245;color:#060d08;box-shadow:0 0 12px rgba(124,194,69,.25)}
.sp-btn.sp-nba.active{background:#00a8e8;border-color:#00a8e8;color:#fff;box-shadow:0 0 12px rgba(0,168,232,.25)}
.sp-btn.sp-nfl.active{background:#fb923c;border-color:#fb923c;color:#fff;box-shadow:0 0 12px rgba(251,146,60,.25)}
.sp-btn.sp-nhl.active{background:#a78bfa;border-color:#a78bfa;color:#fff;box-shadow:0 0 12px rgba(167,139,250,.25)}
.sp-btn.sp-mlb.active{background:#f59e0b;border-color:#f59e0b;color:#060d08;box-shadow:0 0 12px rgba(245,158,11,.25)}
.sp-btn.sp-tennis.active{background:#22c55e;border-color:#22c55e;color:#fff;box-shadow:0 0 12px rgba(34,197,94,.25)}
.sp-btn.sp-mma.active{background:#e65e4c;border-color:#e65e4c;color:#fff;box-shadow:0 0 12px rgba(230,94,76,.25)}
.sp-btn.sp-esports.active{background:#818cf8;border-color:#818cf8;color:#fff;box-shadow:0 0 12px rgba(129,140,248,.25)}

.sp-cnt{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.25);border-radius:10px;
  padding:0 5px;font-size:.55rem;margin-left:4px;
  min-width:16px;line-height:1.6;
}
.sp-btn.active .sp-cnt{background:rgba(0,0,0,.2)}

/* ================================================================
   ROW 2 — MARKET SUB-NAV (contextual, shown per sport)
   smartbet.gg pill style with dark inset background
================================================================ */
.mkt-row{
  display:flex;gap:5px;padding:7px 14px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;align-items:center;
  background:#080c10;
  min-height:36px;
}
.mkt-row::-webkit-scrollbar{height:0}

.mkt-btn{
  padding:4px 12px;border-radius:50px;font-size:.67rem;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .13s ease;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.035);
  color:#566070;
  user-select:none;font-family:'Inter',sans-serif;
}
.mkt-btn:hover{color:#a0b0be;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.mkt-btn.active{
  background:rgba(181,255,59,.14);
  color:var(--lime);
  border-color:rgba(181,255,59,.35);
  font-weight:700;
}
.mkt-btn.mkt-all{color:#8898a8;border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.06)}
.mkt-btn.mkt-all.active{background:rgba(181,255,59,.15);color:var(--lime);border-color:rgba(181,255,59,.4)}

/* Sport-tinted active market pills */
.mkt-btn.s-soccer.active{background:rgba(124,194,69,.14);color:#7cc245;border-color:rgba(124,194,69,.4)}
.mkt-btn.s-nba.active{background:rgba(0,168,232,.13);color:#00a8e8;border-color:rgba(0,168,232,.38)}
.mkt-btn.s-nfl.active{background:rgba(251,146,60,.13);color:#fb923c;border-color:rgba(251,146,60,.38)}
.mkt-btn.s-nhl.active{background:rgba(167,139,250,.13);color:#a78bfa;border-color:rgba(167,139,250,.38)}
.mkt-btn.s-mlb.active{background:rgba(245,158,11,.13);color:#f59e0b;border-color:rgba(245,158,11,.38)}
.mkt-btn.s-mma.active{background:rgba(230,94,76,.13);color:#e65e4c;border-color:rgba(230,94,76,.38)}
.mkt-btn.s-esports.active{background:rgba(129,140,248,.13);color:#818cf8;border-color:rgba(129,140,248,.38)}

.mkt-cnt{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);border-radius:8px;
  padding:0 4px;font-size:.53rem;margin-left:3px;
  min-width:14px;line-height:1.6;
}

/* Markets with 0 picks — shown but dimmed, non-interactive feel */
.mkt-btn.mkt-empty{
  opacity:.38;cursor:default;
  pointer-events:none;
}
.mkt-btn.mkt-empty:hover{color:#566070;background:rgba(255,255,255,.035);border-color:rgba(255,255,255,.06)}

/* Separator between market groups */
.mkt-sep{width:1px;height:16px;background:rgba(255,255,255,.06);flex-shrink:0;margin:0 3px}
.mkt-group-lbl{font-size:.5rem;font-weight:700;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;padding:0 2px;white-space:nowrap}

/* Legacy compat */
.cnt{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:10px;padding:0 5px;font-size:.57rem;margin-left:3px;min-width:16px;line-height:1.5}

/* ================================================================
   ROW 3 — TOOLBAR
================================================================ */
.toolbar{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);overflow-x:auto}
.toolbar::-webkit-scrollbar{height:0}
.tb-lbl{font-size:.6rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.tb-sep{width:1px;height:16px;background:var(--border3);flex-shrink:0}
.tb-btn{padding:3px 10px;border-radius:6px;font-size:.66rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .13s;border:1px solid var(--border);background:transparent;color:var(--t3);user-select:none;font-family:'Inter',sans-serif}
.tb-btn:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.tb-btn.act{background:var(--bg-card2);color:var(--t1);border-color:var(--border3)}
.picks-count{font-size:.64rem;color:var(--t3);margin-left:auto;flex-shrink:0;white-space:nowrap}

/* ================================================================
   ROW 4 — STATS BAR
================================================================ */
.stats-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;background:var(--bg-card2)}
.stats-bar::-webkit-scrollbar{height:0}
.sb-cell{padding:6px 18px;border-right:1px solid var(--border);flex-shrink:0;text-align:center}
.sb-cell:last-child{border-right:none}
.sb-v{font-size:.9rem;font-weight:800;display:block;line-height:1}
.sb-l{font-size:.52rem;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* ================================================================
   PICKS GRID
================================================================ */
.picks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;padding:10px}

/* ================================================================
   UNIFIED PICK CARD
================================================================ */
.pcard{
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .15s;
  animation:cIn .18s ease both;position:relative;
}
.pcard:hover{border-color:rgba(255,255,255,.12);transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.pcard.selected{border-color:var(--lime);box-shadow:0 0 0 1px var(--lime-brd)}
.pcard.deselected{opacity:.34}
@keyframes cIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pcard:nth-child(1){animation-delay:.02s}.pcard:nth-child(2){animation-delay:.04s}
.pcard:nth-child(3){animation-delay:.06s}.pcard:nth-child(4){animation-delay:.08s}
.pcard:nth-child(5){animation-delay:.10s}.pcard:nth-child(6){animation-delay:.12s}
.pcard:nth-child(7){animation-delay:.14s}.pcard:nth-child(8){animation-delay:.16s}

/* Card top line */
.card-top{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px 6px;
  font-size:.6rem;font-weight:600;color:var(--t3);
  border-bottom:1px solid var(--border2);
}
.sport-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sport-label{font-weight:700;font-size:.6rem;letter-spacing:.3px}
.matchup-text{color:var(--t2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.time-text{color:var(--t3);font-size:.58rem;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:3px;font-size:.58rem;font-weight:700;color:var(--red);flex-shrink:0}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Card body */
.card-body{display:flex;align-items:flex-start;gap:10px;padding:10px 12px 8px}
.pick-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid;}
.pick-icon svg{width:18px;height:18px}
.pick-text{flex:1;min-width:0}
.pick-player{font-size:.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.45px;margin-bottom:2px}
.pick-line{font-size:.92rem;font-weight:800;color:var(--t1);line-height:1.25;margin-bottom:6px}

/* DraftEdge quality indicator */
.pick-quality{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 7px;border-radius:4px;font-size:.58rem;font-weight:700;
  border:1px solid;margin-bottom:4px;
}
.qual-top{background:rgba(0,168,232,.12);border-color:rgba(0,168,232,.35);color:var(--q-blue)}
.qual-hi {background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.3); color:var(--q-green)}
.qual-mid{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--q-yellow)}
.qual-lo {background:rgba(230,94,76,.1); border-color:rgba(230,94,76,.3); color:var(--q-red)}

/* Tags */
.pick-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:5px;font-size:.58rem;font-weight:700;border:1px solid;white-space:nowrap}
.tag-edge   {background:rgba(0,168,232,.1); border-color:rgba(0,168,232,.35);color:var(--blue)}
.tag-fire   {background:rgba(251,146,60,.1);border-color:rgba(251,146,60,.35);color:var(--orange)}
.tag-value  {background:var(--green-dim);   border-color:var(--green-brd);  color:var(--green)}
.tag-prob   {background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);color:var(--purple)}
.tag-warn   {background:rgba(230,94,76,.08);border-color:rgba(230,94,76,.28);color:var(--red)}
.tag-neu    {background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--t3)}
.tag-combo  {background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:var(--purple)}
.vol-low    {background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.3); color:#22c55e}
.vol-med    {background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--yellow)}
.vol-high   {background:rgba(230,94,76,.1); border-color:rgba(230,94,76,.3); color:var(--red)}

/* Expand button */
.card-xbtn{position:absolute;top:8px;right:10px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.card-xbtn:hover{background:rgba(255,255,255,.1)}
.card-xbtn svg{transition:transform .2s}
.card-xbtn.open svg{transform:rotate(180deg)}

/* ================================================================
   METRICS ROW — Standard: Projection | Probability | Edge | Best Odds
================================================================ */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border2);}
.metric{padding:9px 6px;text-align:center;border-right:1px solid var(--border2)}
.metric:last-child{border-right:none}
.m-lbl{font-size:.52rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.m-val{font-size:.92rem;font-weight:800;color:var(--t1);line-height:1}
.m-val.proj{color:var(--blue)}
.m-val.edge-hi{color:#22c55e}.m-val.edge-mid{color:var(--yellow)}.m-val.edge-lo{color:var(--orange)}.m-val.edge-neg{color:var(--red)}
.m-val.odds-val{color:var(--lime)}
.m-val.floor-val{color:var(--t3)}
.m-val.ceil-val{color:#22c55e}
.m-sub{font-size:.54rem;color:var(--t3);margin-top:2px}
.m-sub.am-odds{color:var(--yellow);font-weight:700;font-size:.58rem}

/* ================================================================
   PROP METRICS ROW (DraftEdge Style) — Floor | Ceiling | L5 | L10
================================================================ */
.prop-metrics{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border2);background:rgba(0,0,0,.15);}
.prop-metric{padding:6px 4px;text-align:center;border-right:1px solid var(--border2)}
.prop-metric:last-child{border-right:none}
.pm-lbl{font-size:.5rem;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.pm-val{font-size:.78rem;font-weight:800;line-height:1}
.pm-val.floor-c{color:var(--t3)}
.pm-val.ceil-c{color:#22c55e}
.pm-val.l5-c{color:var(--blue)}
.pm-val.l10-c{color:var(--t2)}

/* ================================================================
   DFS SALARY / DEF RANK ROW (DraftEdge specific)
================================================================ */
.dfs-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;border-top:1px solid var(--border2);
  background:rgba(0,0,0,.12);
}
.dfs-sal{display:flex;align-items:center;gap:6px}
.dfs-sal-chip{
  padding:2px 8px;border-radius:4px;font-size:.62rem;font-weight:700;
  border:1px solid;
}
.dfs-dk{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--gold)}
.dfs-fd{background:rgba(0,168,232,.08);border-color:rgba(0,168,232,.25);color:var(--blue)}
.def-rank-wrap{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--t3)}
.def-rank-badge{
  padding:2px 7px;border-radius:4px;font-size:.62rem;font-weight:700;border:1px solid;
}
.def-easy{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#22c55e}
.def-med{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--yellow)}
.def-tough{background:rgba(230,94,76,.1);border-color:rgba(230,94,76,.3);color:var(--red)}

/* ================================================================
   FORM DOTS
================================================================ */
.form-row{display:flex;align-items:center;gap:3px;padding:5px 12px 8px;flex-wrap:wrap}
.fdot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:700;color:#fff;flex-shrink:0;}
.fdot.h{background:#22c55e}.fdot.m{background:#e65e4c}
.form-hits{font-size:.6rem;color:var(--t2);font-weight:700;margin-left:5px}

/* ================================================================
   EXPAND PANEL
================================================================ */
.xpanel{border-top:1px solid var(--border2);padding:10px 12px 12px;display:none}
.xpanel.open{display:block}

/* EV metrics row inside expand */
.ev-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px}
.ev-cell{background:var(--bg-card2);border:1px solid var(--border);border-radius:7px;padding:6px 4px;text-align:center}
.ev-cell .v{font-size:.74rem;font-weight:700}
.ev-cell .l{font-size:.5rem;color:var(--t4);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}

/* Advanced Prop Stats (DraftEdge: Pace/Usage/Min/RestDays) */
.adv-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.adv-cell{background:rgba(0,168,232,.04);border:1px solid rgba(0,168,232,.12);border-radius:7px;padding:6px 4px;text-align:center}
.adv-cell .v{font-size:.72rem;font-weight:700;color:var(--blue)}
.adv-cell .l{font-size:.49rem;color:var(--t4);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}

/* 7-Filter panel */
.filter-panel{background:rgba(0,0,0,.25);border:1px solid var(--border2);border-radius:9px;padding:10px;margin-bottom:8px}
.fp-title{font-size:.57rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.fp-score-badge{padding:2px 9px;border-radius:20px;font-size:.57rem;font-weight:700;border:1px solid}
.fp-score-high{background:rgba(124,194,69,.12);border-color:var(--green-brd);color:var(--green)}
.fp-score-mid{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--yellow)}
.fp-score-low{background:rgba(230,94,76,.1);border-color:rgba(230,94,76,.3);color:var(--red)}
.filter-rows{display:flex;flex-direction:column;gap:5px}
.filter-row{display:flex;align-items:flex-start;gap:7px}
.f-id{font-size:.55rem;font-weight:700;color:var(--t4);font-family:monospace;width:22px;flex-shrink:0;padding-top:2px}
.f-lbl{font-size:.62rem;color:var(--t2)}
.f-val{font-size:.62rem;font-weight:700;white-space:nowrap}
.f-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:2px}
.f-bar{height:100%;border-radius:2px;transition:width .5s}
.f-det{font-size:.53rem;color:var(--t4);margin-top:2px}
.f-pass{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;flex-shrink:0;margin-top:1px}
.f-pass.ok{background:rgba(34,197,94,.15);color:#22c55e}
.f-pass.warn{background:rgba(245,158,11,.15);color:var(--yellow)}
.f-pass.fail{background:rgba(230,94,76,.15);color:var(--red)}

/* Correlation tags */
.corr-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.ctag{padding:2px 6px;border-radius:4px;font-size:.56rem;font-weight:700;border:1px solid}
.ctag-pos{background:rgba(34,197,94,.09);border-color:rgba(34,197,94,.28);color:#22c55e}
.ctag-neg{background:rgba(230,94,76,.09);border-color:rgba(230,94,76,.25);color:var(--red)}

<script>
'use strict';

/* ================================================================
   MARKET CATEGORY MAPPING
================================================================ */
function getMktCat(mktKey, pickStr, point) {
  const o  = (pickStr||'').toLowerCase();
  const pt = point != null ? Math.abs(point) : null;
  switch (mktKey) {
    case 'h2h': case 'h2h_lay':               return '1x2';
    case 'double_chance':                      return 'dc';
    case 'btts':                               return 'btts';
    case 'draw_no_bet':                        return 'dnb';
    case 'spreads': case 'alternate_spreads':  return 'ah';
    case 'shots_on_target':                    return 'shot';
    case 'team_shots_on_target':               return 'shot_t';
    case 'corners':                            return 'corner';
    case 'team_corners':                       return 'corner_t';
    case 'cards': case 'player_cards':         return 'card';
    case 'team_cards':                         return 'card_t';
    case 'first_half_totals': case 'first_half_spreads': return 'ht';
    case 'team_totals':                        return 'tt';
    case 'totals': case 'alternate_totals':
      if (o.includes('1st half')||o.includes('first half')||o.includes('ht')) return 'ht';
      if (pt == null) return 'ou25';
      if (pt <= 1.5) return 'ou15';
      if (pt <= 2.5) return 'ou25';
      if (pt <= 3.5) return 'ou35';
      return 'ou25';
    /* ---- American sports team markets ---- */
    case 'spreads_nba': case 'nba_spread':     return 'spread';
    case 'totals_nba':                         return 'total';
    case 'team_totals_nba':                    return 'teamtot';
    case 'h2h_nba': case 'moneyline':          return 'ml';
    case 'puckline':                           return 'puckline';
    case 'runline':                            return 'runline';
    case 'first_half': case 'first_quarter':   return 'fh';
    default:
      if (o.includes('corner'))                          return 'corner';
      if (o.includes('card'))                            return 'card';
      if (o.includes('shot')||o.includes('sot'))         return 'shot';
      if (o.includes('first half')||o.includes(' ht '))  return 'ht';
      if (o.startsWith('over')||o.startsWith('under'))   return 'ou25';
      return '1x2';
  }
}

function getSportCat(sk) {
  const s = (sk||'').toLowerCase();
  if (s.includes('basketball_nba')||s.includes('nba')) return 'nba';
  if (s.includes('ncaamb')||s.includes('ncaawb')||s.includes('college_basketball')) return 'ncaabb';
  if (s.includes('euroliga')||s.includes('euroleague')) return 'euroliga';
  if (s.includes('basketball')) return 'nba';
  if (s.includes('nfl')||s.includes('americanfootball_nfl')) return 'nfl';
  if (s.includes('ncaafb')||s.includes('college_football')) return 'ncaafb';
  if (s.includes('americanfootball')) return 'nfl';
  if (s.includes('nhl')||s.includes('icehockey_nhl')) return 'nhl';
  if (s.includes('shl')||s.includes('sweden')) return 'shl';
  if (s.includes('hockey')) return 'nhl';
  if (s.includes('baseball_mlb')||s.includes('mlb')) return 'mlb';
  if (s.includes('baseball')) return 'mlb';
  if (s.includes('atp')||s.includes('wta')||s.includes('tennis')) return 'tennis';
  if (s.includes('nrl')||s.includes('rugby_league')) return 'rugby_league';
  if (s.includes('rugby_union')||s.includes('super_rugby')||s.includes('six_nations')) return 'rugby_union';
  if (s.includes('rugby')) return 'rugby_union';
  if (s.includes('cricket')) return 'cricket';
  if (s.includes('mma')||s.includes('ufc')||s.includes('boxing')) return 'mma';
  if (s.includes('golf')||s.includes('pga')) return 'golf';
  if (s.includes('afl')) return 'afl';
  if (s.includes('esport')||s.includes('csgo')||s.includes('cs2')||s.includes('lol')||s.includes('dota')||s.includes('valorant')) return 'esports';
  return 'soccer';
}

/* ================================================================
   DRAFTEDGE-INSPIRED METRICS ENGINE
   Floor / Ceiling / Volatility per market
   Source: DraftEdge AI MSE algorithm baseline approach
================================================================ */
function computeFloorCeil(pick) {
  const mkt    = pick.mktKey || 'h2h';
  const sport  = getSportCat(pick.sportKey || '');
  const proj   = computeProjection(pick);
  if (proj == null) return { floor: null, ceil: null, vol: null };

  const meta  = PROP_KEYS[mkt] || {};
  const volKey = meta.vol || 'med';

  // Volatility multipliers based on DraftEdge methodology
  const V = { low: { floor: 0.72, ceil: 1.35 }, med: { floor: 0.60, ceil: 1.55 }, high: { floor: 0.40, ceil: 1.85 } };
  const v = V[volKey] || V.med;

  // Apply form adjustment if real data available
  let adjFloor = proj * v.floor;
  let adjCeil  = proj * v.ceil;

  if (pick.form_last10 && Array.isArray(pick.form_last10) && pick.form_last10.length >= 5) {
    const vals = pick.form_last10.slice(-10);
    const sorted = [...vals].sort((a,b) => a-b);
    adjFloor = sorted[Math.floor(sorted.length * 0.15)] ?? adjFloor;
    adjCeil  = sorted[Math.floor(sorted.length * 0.85)] ?? adjCeil;
  }
  return {
    floor: Math.max(0, adjFloor).toFixed(1),
    ceil:  adjCeil.toFixed(1),
    vol:   volKey,
  };
}

/* Compute L5/L10 from real or estimated data (DraftEdge columns) */
function computeL5L10(pick) {
  if (pick.form_last10 && Array.isArray(pick.form_last10) && pick.form_last10.length >= 5) {
    const v = pick.form_last10.slice(-10);
    const l5  = v.slice(-5).reduce((s,x)=>s+x,0) / Math.min(5,v.length);
    const l10 = v.reduce((s,x)=>s+x,0) / v.length;
    return { l5: l5.toFixed(1), l10: l10.toFixed(1) };
  }
  const proj = computeProjection(pick);
  if (!proj) return { l5: '--', l10: '--' };
  // Estimate with slight variance
  const s = (pick.game||'').split('').reduce((acc,c,i)=>acc+c.charCodeAt(0)*(i+1),0);
  const l5  = (proj * (0.92 + (Math.sin(s)*0.15))).toFixed(1);
  const l10 = (proj * (0.95 + (Math.cos(s)*0.08))).toFixed(1);
  return { l5, l10 };
}

/* Get opponent defense rank for a player's position */
function getDefRank(pick) {
  const sport = getSportCat(pick.sportKey||'');
  if (sport !== 'nba') return null;
  const opp = (pick.away || pick.home || '').toLowerCase();
  const pos = (pick.playerPos || 'sf').toLowerCase();
  let teamRanks = NBA_DEF_RANKS.default;
  for (const k in NBA_DEF_RANKS) {
    if (k !== 'default' && opp.includes(k)) { teamRanks = NBA_DEF_RANKS[k]; break; }
  }
  const rank = teamRanks[pos] || 15;
  return { rank, easy: rank >= 22, tough: rank <= 8 };
}

/* Get DraftEdge quality label and class */
function getDraftEdgeQuality(dfsProj) {
  if (dfsProj >= 8)  return { cls:'qual-top', lbl:'&#x25CF; Top Pick', color:'var(--q-blue)' };
  if (dfsProj >= 6)  return { cls:'qual-hi',  lbl:'&#x25CF; Solid',    color:'var(--q-green)' };
  if (dfsProj >= 4)  return { cls:'qual-mid', lbl:'&#x25CF; Avg',      color:'var(--q-yellow)' };
  return              { cls:'qual-lo',  lbl:'&#x25CF; Risky',   color:'var(--q-red)' };
}

/* Convert decimal to American odds */
function toAmericanOdds(dec) {
  if (!dec || dec <= 1) return '--';
  const d = parseFloat(dec);
  if (d >= 2.0) return '+' + Math.round((d-1)*100);
  return '-' + Math.round(100/(d-1));
}

/* ================================================================
   PROJECTION ENGINE
================================================================ */
function computeProjection(pick) {
  const mkt   = pick.mktKey || 'h2h';
  const sk    = pick.sportKey || '';
  const sport = getSportCat(sk);
  const pt    = pick.point != null ? Math.abs(pick.point) : null;
  const pname = (pick.playerName || pick.pick || '').toLowerCase();

  if (pick.projection && typeof pick.projection === 'number') return pick.projection;

  if (isPropKey(mkt)) {
    const avg = getPlayerAvg(pname, mkt, sport);
    if (avg) return +avg.toFixed(1);
    return pt ? +(pt * 1.02).toFixed(1) : null;
  }

  if (sport === 'mma' || mkt.startsWith('fighter_')) {
    if (mkt === 'fighter_total_rounds') return pt ? +(pt * 0.95).toFixed(1) : 2.1;
    if (mkt === 'fighter_significant_strikes') return 45.2;
    return null;
  }
  if (sport === 'esports') {
    if (mkt === 'esports_total_maps') return pt ? +(pt * 0.95).toFixed(1) : 2.3;
    if (mkt === 'esports_round_total') return pt ? +(pt * 0.97).toFixed(1) : 26.0;
    if (mkt === 'esports_player_kills') return pt ? +(pt * 1.05).toFixed(1) : 14.5;
    return null;
  }

function genDots(gameName,n,hitRate,baseVals){
  let seed=0;
  for(let i=0;i<gameName.length;i++)seed+=gameName.charCodeAt(i)*(i+1);
  return Array.from({length:n},(_,i)=>{
    const hit=(Math.sin(seed+i*17.3)*0.5+0.5)<hitRate;
    const base=baseVals[i%baseVals.length];
    const val=hit?Math.max(1,Math.round(base+Math.sin(seed+i*7.1)*Math.max(1,base*0.2))):0;
    return{hit,val};
  });
}

/* ================================================================

================================================================ */
function pickMktLabel(mktKey,pickStr,point){
  const pt=point!=null?Math.abs(point):null;const o=(pickStr||'').toLowerCase();const dir=o.includes('over')?'Over':o.includes('under')?'Under':'';
  if(isPropKey(mktKey)){const meta=PROP_KEYS[mktKey]||{};return meta.lbl||(mktKey||'').replace(/player_/,'').replace(/_/g,' ');}
  switch(mktKey){
    case 'h2h':return'Moneyline (1X2)';
    case 'double_chance':return'Double Chance';
    case 'btts':return'Both Teams to Score';
    case 'draw_no_bet':return'Draw No Bet';
    case 'spreads':case 'alternate_spreads':return'Asian Handicap'+(pt!=null?' '+(point>0?'+':'')+point:'');
    case 'totals':case 'alternate_totals':return(dir||'O/U')+(pt?' '+pt+' Goals':'');
    case 'first_half_totals':return'HT '+(dir||'O/U')+(pt?' '+pt:'');
    case 'team_totals':return'Team Total'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'shots_on_target':return'Shots on Target'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'team_shots_on_target':return'Team SoT'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'corners':return'Corner Kicks'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'team_corners':return'Team Corners'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'cards':return'Cards'+(pt?' '+(dir||'Over')+' '+pt:'');
    case 'team_cards':return'Team Cards'+(pt?' '+(dir||'Over')+' '+pt:'');
    default:return(mktKey||'').replace(/_/g,' ');
  }
}

/* Time display */
function fmtTime(game_time){
  if(!game_time)return{html:'',isLive:false};
  try{
    const d=new Date(game_time),now=new Date();
    if(d<now)return{html:'<div class="live-pill"><div class="live-dot"></div>AO VIVO</div>',isLive:true};
    const mth=d.toLocaleDateString('en-US',{month:'short'});const day=d.getDate();const hh=d.getHours().toString().padStart(2,'0');const mm=d.getMinutes().toString().padStart(2,'0');
    return{html:'<span class="time-text">'+mth+' '+day+', '+hh+':'+mm+'</span>',isLive:false};
  }catch(e){return{html:'',isLive:false};}
}

/* Build tags */
function buildTags(ev,prob,projection,line,mktKey,sport){
  const tags=[];
  if(ev>=12)tags.push({cls:'tag-fire',t:'&#x1F525; High Edge'});
  else if(ev>=5)tags.push({cls:'tag-edge',t:'+ High Edge'});
  else if(ev>=3)tags.push({cls:'tag-value',t:'Value Bet'});
  if(prob>=70)tags.push({cls:'tag-prob',t:'High Prob'});
  if(projection&&line){const margin=projection-line;if(margin>2)tags.push({cls:'tag-value',t:'Proj Favors'});if(margin<-1)tags.push({cls:'tag-warn',t:'Tough Line'});}
  if(sport==='mma'){tags.push({cls:'tag-neu',t:'UFC/MMA'});}
  if(sport==='esports')tags.push({cls:'tag-neu',t:'E-Sports'});
  if(isPropKey(mktKey)){
    const meta=PROP_KEYS[mktKey]||{};
    if(meta.vol==='low')tags.push({cls:'vol-low',t:'Low Vol'});
    else if(meta.vol==='high')tags.push({cls:'vol-high',t:'High Vol'});
    if(meta.quality==='best')tags.push({cls:'tag-edge',t:'Top Market'});
    if(mktKey.includes('rebounds_assists'))tags.push({cls:'tag-combo',t:'Combo Mkt'});
  }else{
    if(mktKey==='btts')tags.push({cls:'tag-neu',t:'BTTS'});
    if(mktKey==='draw_no_bet')tags.push({cls:'tag-value',t:'DNB'});
  }
  return tags.slice(0,3);
}

================================================================ */
function buildAnalysisText(p,ev,prob,projection,line,analysis){
  const mkt=p.mktKey||'h2h',sk=p.sportKey||'',sport=getSportCat(sk);
  const lg=LEAGUE_STATS[sk]||LEAGUE_STATS.default,ns=NS_STATS[sk]||NS_STATS.default;
  const o=(p.pick||'').toLowerCase(),isO=o.includes('over'),pt=p.point!=null?Math.abs(p.point):null;
  const parts=[];
  if(ev>=8)parts.push(`<strong>Edge forte +${ev.toFixed(1)}% EV</strong> vs fair ${p.fair_odd||'--'}.`);
  else if(ev>=5)parts.push(`Edge positivo +${ev.toFixed(1)}% EV.`);
  else parts.push(`+${ev.toFixed(1)}% EV detectado.`);
  if(analysis){
    if(analysis.passCount>=6)parts.push(`<strong>Passou ${analysis.passCount}/7 filtros</strong> — alta confiança.`);
    else if(analysis.passCount>=5)parts.push(`Passou ${analysis.passCount}/7 filtros.`);
    else if(analysis.passCount<=3)parts.push(`Apenas ${analysis.passCount}/7 filtros — cuidado.`);
  }
  if(sport==='soccer'){
    if(mkt==='btts')parts.push(`Liga BTTS: ${lg.btts}%.`);
    else if(mkt==='totals'||mkt==='alternate_totals'){const r=pt<=1.5?lg.ou15:pt<=2.5?lg.ou25:lg.ou35;parts.push(`Liga media ${lg.goals.toFixed(1)} golos — ${isO?'Over':'Under'} ${pt||2.5} acontece em ${r}%.`);}
    else if(mkt==='corners')parts.push(`Media ${lg.corners.toFixed(1)} cantos/jogo.`);
    else if(mkt==='cards')parts.push(`Media ${lg.cards.toFixed(1)} cartoes/jogo.`);
  } else if(sport==='nba'){
    if(mkt==='totals')parts.push(`NBA média total: ${ns.avgTotal} pts. Pace do jogo: factor chave.`);
    else if(isPropKey(mkt)){const fc=computeFloorCeil(p);const l5l10=computeL5L10(p);if(fc.ceil)parts.push(`Teto ${fc.ceil} / Chão ${fc.floor}.`);if(l5l10.l5!=='--')parts.push(`L5: ${l5l10.l5} | L10: ${l5l10.l10}.`);}
  } else if(sport==='nfl'){
    if(isPropKey(mkt)){const l5l10=computeL5L10(p);if(l5l10.l5!=='--')parts.push(`L5: ${l5l10.l5} | L10: ${l5l10.l10}.`);}
  } else if(sport==='nhl'){
    if(isPropKey(mkt)&&mkt==='player_shots_on_goal')parts.push(`SOG é o mercado mais estável na NHL (Low Vol).`);
  } else if(sport==='mlb'){
    if(mkt==='player_strikeouts')parts.push(`Strikeouts: mercado mais eficiente para pitchers (Low Vol).`);
  }
  if(projection!=null&&line!=null){const margin=projection-line;if(isO&&margin>1)parts.push(`Projeção ${projection.toFixed(1)} > linha ${line}.`);else if(!isO&&margin<-1)parts.push(`Projeção ${projection.toFixed(1)} < linha ${line}.`);}
  if(prob>=70)parts.push(`Alta confiança ~${prob.toFixed(0)}%.`);
  return parts.join(' ');
}

/* ================================================================
   COUNT CATS
================================================================ */
function countCats(){
  const c={all:PICKS.length};
  PICKS.forEach(p=>{
    if(isPropKey(p.mktKey)){
      const meta=PROP_KEYS[p.mktKey]||{};const pc=meta.cat||'pp_pts';const sc=getSportCat(p.sportKey||p.sport||'');
      c[pc]=(c[pc]||0)+1;c[sc]=(c[sc]||0)+1;c.props=(c.props||0)+1;
      // Parent sport props bucket
      const bucket=pc.startsWith('pp_nfl')?'pp_nfl':pc.startsWith('pp_nhl')?'pp_nhl':pc.startsWith('pp_mlb')?'pp_mlb':pc.startsWith('pp_mma')?'pp_mma':pc.startsWith('pp_esports')?'pp_esports':null;
      if(bucket&&bucket!==pc)c[bucket]=(c[bucket]||0)+1;
    } else {
      const mc=getMktCat(p.mktKey||'h2h',p.pick,p.point);const sc=getSportCat(p.sportKey||p.sport||'');
      c[mc]=(c[mc]||0)+1;c[sc]=(c[sc]||0)+1;
    }
    if(parseFloat(p.ev_pct||p.ev||0)>=3)c.value=(c.value||0)+1;
  });
  return c;
}

================================================================ */
function filterPicks(cat){
  // cat is the result of getActiveCat()
  return PICKS.filter(p=>{
    if(!cat||cat==='all')return true;
    if(cat==='value')return parseFloat(p.ev_pct||p.ev||0)>=3;
    if(cat==='props')return isPropKey(p.mktKey);
    if(isPropKey(p.mktKey)){
      const meta=PROP_KEYS[p.mktKey]||{};const pc=meta.cat||'pp_pts';const sc=getSportCat(p.sportKey||p.sport||'');
      const bucket=pc.startsWith('pp_nfl')?'pp_nfl':pc.startsWith('pp_nhl')?'pp_nhl':pc.startsWith('pp_mlb')?'pp_mlb':pc.startsWith('pp_mma')?'pp_mma':pc.startsWith('pp_esports')?'pp_esports':null;
      return pc===cat||sc===cat||bucket===cat;
    }
    const mc=getMktCat(p.mktKey||'h2h',p.pick,p.point);const sc=getSportCat(p.sportKey||p.sport||'');
    return mc===cat||sc===cat;
  });
}
function applyMinEV(picks){return MIN_EV<=0?picks:picks.filter(p=>parseFloat(p.ev_pct||p.ev||0)>=MIN_EV);}
function sortPicks(picks){return[...picks].sort((a,b)=>{if(SORT_BY==='ev')return parseFloat(b.ev_pct||b.ev||0)-parseFloat(a.ev_pct||a.ev||0);if(SORT_BY==='odds')return parseFloat(b.odds_best||b.odds||0)-parseFloat(a.odds_best||a.odds||0);if(SORT_BY==='prob')return parseFloat(b.prob_real||50)-parseFloat(a.prob_real||50);return 0;});}
function getVisible(){return sortPicks(applyMinEV(filterPicks(getActiveCat())));}

================================================================ */
let PB_SPORT='all',PB_LEGS_COUNT=3,PB_WAGER=100;

function buildBestParlay(picks,sport,nLegs){
  let pool=picks.filter(p=>{const s=getSportCat(p.sportKey||p.sport||'');return sport==='all'||s===sport;});
  pool=pool.slice().sort((a,b)=>parseFloat(b.ev_pct||b.ev||0)-parseFloat(a.ev_pct||a.ev||0));
  const usedGames=new Set();const legs=[];
  for(const p of pool){const gk=`${(p.home||'').toLowerCase()}|${(p.away||'').toLowerCase()}`;if(!usedGames.has(gk)&&legs.length<nLegs){usedGames.add(gk);legs.push(p);}}
  return legs;
}
function parlayOdds(legs){return legs.reduce((acc,p)=>acc*parseFloat(p.odds_best||p.odds||1.91),1);}
function parlayProb(legs){return legs.reduce((acc,p)=>acc*(parseFloat(p.prob_real||50)/100),1)*100;}
function parlayEV(legs,wager){const prob=parlayProb(legs)/100;const odds=parlayOdds(legs);return(prob*(wager*(odds-1))-(1-prob)*wager).toFixed(2);}
function teamColor(pick){const s=getSportCat(pick.sportKey||pick.sport||'');return SPORT_COLOR[s]||'#1a2836';}
function teamInitials(name){if(!name)return'?';const parts=name.trim().split(' ');if(parts.length>=2)return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();return name.slice(0,2).toUpperCase();}

function renderLegRow(leg,i){
  const d=parseFloat(leg.odds_best||leg.odds||1.91);const ev=parseFloat(leg.ev_pct||leg.ev||0);
  const am=toAmericanOdds(d);const mkt=pickMktLabel(leg.mktKey||'h2h',leg.pick,leg.point);
  const player=leg.playerName||'';const pickName=player?`${player} ${leg.pick||''}`:leg.pick||'';
  const initials=teamInitials(leg.away||leg.home||'');const col=teamColor(leg);
  return`<div class="pb-leg" id="pb-leg-${i}">
    <div class="pb-team-logo" style="--team-color:${col}22;background:${col}22;border-color:${col}55"><span style="color:${col}">${initials}</span></div>
    <div class="pb-leg-info"><div class="pb-leg-pick">${pickName}</div><div class="pb-leg-mkt">${mkt}</div><div class="pb-leg-matchup">${leg.home||''} vs ${leg.away||''}</div></div>
    <div><div class="pb-leg-odds">${d.toFixed(2)}<span class="am">${am}</span></div><div class="pb-leg-ev">+${ev.toFixed(1)}% EV</div></div>
    <button class="pb-leg-remove" onclick="PM.removePBLeg(${i})" title="Remove">&#x2715;</button>
  </div>`;
}

    const legs=[...SELECTED].map(i=>PICKS[i]).filter(Boolean);if(!legs.length)return;
    const co=legs.reduce((p,l)=>p*parseFloat(l.odds_best||l.odds||1),1);
    const type=legs.length===1?'SIMPLES':legs.length===2?'DUPLA':legs.length===3?'TRIPLA':`${legs.length}-FOLD`;
    const txt=`${type}\n${legs.map((l,i)=>`${i+1}. ${l.home} vs ${l.away}\n   ${l.pick||l.playerName||''} @ ${parseFloat(l.odds_best||l.odds).toFixed(2)}\n   EV:+${l.ev_pct||l.ev}% | ${l.bookmaker||''}`).join('\n')}\nOdd combinada: ${co.toFixed(2)}\n- Manuel Danca`;

  },

/* Helpers */
function guessKey(sport){
  const s=(sport||'').toLowerCase();
  if(s.includes('premier'))return'soccer_epl';
  if(s.includes('la liga'))return'soccer_spain_la_liga';
  if(s.includes('serie a'))return'soccer_italy_serie_a';
  if(s.includes('bundesliga'))return'soccer_germany_bundesliga';
  if(s.includes('ligue'))return'soccer_france_ligue_one';
  if(s.includes('nba'))return'basketball_nba';
  if(s.includes('nfl'))return'americanfootball_nfl';
  if(s.includes('nhl'))return'icehockey_nhl';
  if(s.includes('mlb'))return'baseball_mlb';
  return'';
}
function extractPt(str){const m=(str||'').match(/\d+\.?\d*/);return m?parseFloat(m[0]):null;}
function toast(msg,type){
  type=type||'i';const w=document.getElementById('tw');if(!w)return;
  const el=document.createElement('div');el.className=`t t-${type}`;el.textContent=msg;w.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3500);
}
